<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${boardName}">게시판</title>
</head>
<body>

<div th:text="${boardName}">자유게시판</div>

<div th:each="article : ${articles}">
  <h3 th:text="${article.title}">제목</h3>
  <div>
    <span th:text="${postsViewService.getMemberName(article.memberId)}">회원</span>
    | <span th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd')}">날짜</span>
  </div>
  <div th:if="${article.content != null and !article.content.isEmpty()}"
       th:text="${article.content}">내용</div>
</div>

</body>
</html>
